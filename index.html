<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Robot Control Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 600px;
    }
    input {
      margin: 5px;
      padding: 5px;
    }
    button {
      padding: 10px;
      margin: 5px;
      min-width: 100px;
    }
    hr {
      margin-top: 20px;
      margin-bottom: 20px;
    }
    #status {
      font-weight: bold;
    }
  </style>
</head>
<body>
<h2>Robot Control (Arrow Keys)</h2>
<h3>ROS Connection</h3>
<label>ROS2 PC IP:</label>
<input type="text" id="ros_ip" value="192.168.1.100">
<label>Port:</label>
<input type="number" id="ros_port" value="9090">
<button onclick="connectROS()">Connect</button>
<p>Status: <span id="status">Disconnected</span></p>
<hr>
<h3>Speed Settings</h3>
<label>Linear:</label>
<input type="number" id="linear" value="0.3" step="0.1">
<br><br>
<label>Angular:</label>
<input type="number" id="angular" value="1.0" step="0.1">
<hr>
<h3>Odometry</h3>
<p>X: <span id="pos_x">0</span></p>
<p>Y: <span id="pos_y">0</span></p>
<p>Theta (deg): <span id="theta">0</span></p>
<p>Linear Vel: <span id="lin_vel">0</span></p>
<p>Angular Vel: <span id="ang_vel">0</span></p>
<hr>
<h3>Buttons (optional)</h3>
<button onclick="sendCmd(getLinear(), 0)">Forward</button>
<button onclick="sendCmd(-getLinear(), 0)">Backward</button>
<button onclick="sendCmd(0, getAngular())">Left</button>
<button onclick="sendCmd(0, -getAngular())">Right</button>
<button onclick="sendCmd(0, 0)">Stop</button>
<script>
var ros = null;
var cmdVel = null;
var odomListener = null;
let keys = {};
function connectROS() {
  const ip = document.getElementById("ros_ip").value;
  const port = document.getElementById("ros_port").value;
  const ws_url = `ws://${ip}:${port}`;
  document.getElementById("status").innerText =
    "Connecting...";
  ros = new ROSLIB.Ros({
    url: ws_url
  });
  ros.on('connection', () => {
    console.log("Connected to ROS");
    document.getElementById("status").innerText =
      "Connected";

    setupTopics();
  });

  ros.on('error', (error) => {
    console.error("ROS Error:", error);
    document.getElementById("status").innerText =
      "Error";
  });
  ros.on('close', () => {
    console.log("ROS connection closed");
    document.getElementById("status").innerText =
      "Closed";
  });
}
function setupTopics() {
  cmdVel = new ROSLIB.Topic({
    ros: ros,
    name: '/cmd_vel',
    messageType: 'geometry_msgs/msg/Twist'
  });
  odomListener = new ROSLIB.Topic({
    ros: ros,
    name: '/odom',
    messageType: 'nav_msgs/msg/Odometry'
  });

  odomListener.subscribe(function(msg) {

    document.getElementById("pos_x").innerText =
      msg.pose.pose.position.x.toFixed(3);

    document.getElementById("pos_y").innerText =
      msg.pose.pose.position.y.toFixed(3);

    let q = msg.pose.pose.orientation;

    let siny_cosp = 2 * (q.w * q.z + q.x * q.y);
    let cosy_cosp = 1 - 2 * (q.y * q.y + q.z * q.z);

    let yaw = Math.atan2(siny_cosp, cosy_cosp);

    let yaw_deg = yaw * 180 / Math.PI;

    document.getElementById("theta").innerText =
      yaw_deg.toFixed(1);

    document.getElementById("lin_vel").innerText =
      msg.twist.twist.linear.x.toFixed(3);

    document.getElementById("ang_vel").innerText =
      msg.twist.twist.angular.z.toFixed(3);
  });
}
function getLinear() {
  return parseFloat(
    document.getElementById("linear").value
  );
}

function getAngular() {
  return parseFloat(
    document.getElementById("angular").value
  );
}
function sendCmd(lin, ang) {

  if (!cmdVel) {
    console.log("Not connected");
    return;
  }

  var twist = new ROSLIB.Message({
    linear: {
      x: lin,
      y: 0,
      z: 0
    },
    angular: {
      x: 0,
      y: 0,
      z: ang
    }
  });

  cmdVel.publish(twist);
}

document.addEventListener("keydown", (e) => {

  const key = e.key.toLowerCase();

  if ([
    "arrowup",
    "arrowdown",
    "arrowleft",
    "arrowright"
  ].includes(key)) {
    e.preventDefault();
  }

  keys[key] = true;
});

document.addEventListener("keyup", (e) => {

  const key = e.key.toLowerCase();

  keys[key] = false;
  if (
    !keys['arrowup'] &&
    !keys['arrowdown'] &&
    !keys['arrowleft'] &&
    !keys['arrowright']
  ) {
    sendCmd(0, 0);
  }
});
setInterval(() => {

  let lin = 0;
  let ang = 0;

  if (keys['arrowup']) {
    lin += getLinear();
  }

  if (keys['arrowdown']) {
    lin -= getLinear();
  }

  if (keys['arrowleft']) {
    ang += getAngular();
  }

  if (keys['arrowright']) {
    ang -= getAngular();
  }
  if (lin !== 0 || ang !== 0) {
    sendCmd(lin, ang);
  }

}, 50);
</script>

</body>
</html>
